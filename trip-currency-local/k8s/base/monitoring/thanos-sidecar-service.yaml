# Thanos Sidecar gRPC Service (외부 접근용)
apiVersion: v1
kind: Service
metadata:
  name: thanos-sidecar
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-sidecar
spec:
  type: NodePort  # 로컬 클러스터는 NodePort, EKS는 LoadBalancer 또는 Ingress
  ports:
  - name: grpc
    port: 10901
    targetPort: 10901
    nodePort: 30901  # 로컬에서 Docker Thanos Query가 접근
    protocol: TCP
  - name: http
    port: 10902
    targetPort: 10902
    nodePort: 30902
    protocol: TCP
  selector:
    app.kubernetes.io/name: prometheus
    prometheus: kube-prometheus-stack-prometheus

