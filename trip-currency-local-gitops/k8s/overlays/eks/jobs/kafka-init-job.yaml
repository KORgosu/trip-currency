---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-init
  namespace: trip-service-prod
spec:
  podSelector:
    matchLabels:
      app: kafka-init
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init
  namespace: trip-service-prod
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: kafka-init
        job-type: kafka-init
    spec:
      restartPolicy: Never
      serviceAccountName: sa-dataingestor
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: kafka-init
        image: confluentinc/cp-kafka:7.4.0
        command: ["sh", "-c"]
        args:
        - |
          BOOTSTRAP=service-kafka:9092

          create_topic() {
            kafka-topics --bootstrap-server $BOOTSTRAP \
              --create --topic "$1" \
              --partitions "${2:-3}" \
              --replication-factor "${3:-1}" \
              --if-not-exists
            echo "Topic '$1': done"
          }

          echo "Waiting for Kafka to be ready..."
          until kafka-topics --bootstrap-server $BOOTSTRAP --list > /dev/null 2>&1; do
            sleep 3
          done
          echo "Kafka is ready."

          create_topic "exchange_rate_updates" 3 1
          create_topic "new_data_received" 3 1
          create_topic "exchange_rate_updated" 3 1
          create_topic "data_processing_completed" 3 1
          create_topic "cache_invalidation" 3 1
          create_topic "user_activity" 3 1
          create_topic "system_notifications" 3 1

          echo "All topics created. Listing:"
          kafka-topics --bootstrap-server $BOOTSTRAP --list
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
