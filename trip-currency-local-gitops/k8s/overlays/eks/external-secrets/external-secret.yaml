---
# AWS Secrets Manager 경로: trip-currency/prod/trip-service-secrets
# 저장할 키-값 예시:
#   mysql-password: <Aurora 비밀번호>
#   mongodb-password: <DocumentDB 비밀번호>
#   exchange-api-key: <실제 API 키>
#   external-service-token: <실제 토큰>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: trip-service-secrets
  namespace: trip-service-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: trip-service-secrets
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: trip-currency/prod/trip-service-secrets
---
# AWS Secrets Manager 경로: trip-currency/prod/mysql-secret
# 저장할 키-값 예시:
#   root-password: <Aurora root 비밀번호>
#   user-password: <Aurora trip_user 비밀번호>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mysql-secret
  namespace: trip-service-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: mysql-secret
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: trip-currency/prod/mysql-secret
---
# AWS Secrets Manager 경로: trip-currency/prod/mongodb-secret
# 저장할 키-값 예시:
#   root-password: <DocumentDB 비밀번호>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mongodb-secret
  namespace: trip-service-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: mongodb-secret
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: trip-currency/prod/mongodb-secret
