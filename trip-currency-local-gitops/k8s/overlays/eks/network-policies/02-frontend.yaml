# service-frontend: ALB(VPC CIDR)에서 80 포트 수신 허용
# 외부 egress 없음 — 정적 파일 서빙만 수행 (JS/CSS → 브라우저가 ALB로 직접 API 호출)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
  namespace: trip-service-prod
spec:
  podSelector:
    matchLabels:
      app: service-frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - ipBlock:
        cidr: 192.168.0.0/16
    ports:
    - protocol: TCP
      port: 80
