apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: trip-service-stability-rules
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
  - name: pod-stability
    interval: 30s
    rules:
    - alert: PodCrashLooping
      expr: |
        rate(kube_pod_container_status_restarts_total{namespace="trip-service-prod"}[15m]) * 60 > 1
      for: 5m
      labels:
        severity: critical
        namespace: trip-service-prod
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"
        description: "Container {{ $labels.container }} in pod {{ $labels.pod }} restarted more than once per minute for 5 minutes."

    - alert: PodNotReady
      expr: |
        kube_pod_status_ready{namespace="trip-service-prod", condition="true"} == 0
      for: 5m
      labels:
        severity: warning
        namespace: trip-service-prod
      annotations:
        summary: "Pod {{ $labels.pod }} is not ready"
        description: "Pod {{ $labels.pod }} has been in a non-ready state for more than 5 minutes."

    - alert: DeploymentReplicasMismatch
      expr: |
        kube_deployment_spec_replicas{namespace="trip-service-prod"}
          != kube_deployment_status_replicas_available{namespace="trip-service-prod"}
      for: 10m
      labels:
        severity: warning
        namespace: trip-service-prod
      annotations:
        summary: "Deployment {{ $labels.deployment }} replicas mismatch"
        description: "Deployment {{ $labels.deployment }} desired replicas != available replicas for 10 minutes."

    - alert: HPAMaxReplicas
      expr: |
        kube_horizontalpodautoscaler_status_current_replicas{namespace="trip-service-prod"}
          == kube_horizontalpodautoscaler_spec_max_replicas{namespace="trip-service-prod"}
      for: 10m
      labels:
        severity: warning
        namespace: trip-service-prod
      annotations:
        summary: "HPA {{ $labels.horizontalpodautoscaler }} at max replicas"
        description: "HPA {{ $labels.horizontalpodautoscaler }} has been running at maximum replicas for 10 minutes — may need scaling limit increase."

  - name: node-stability
    interval: 60s
    rules:
    - alert: NodeHighCPU
      expr: |
        100 - (avg by(node) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.node }} high CPU usage"
        description: "Node {{ $labels.node }} CPU usage is above 85% for 10 minutes (current: {{ $value | printf \"%.1f\" }}%)."

    - alert: NodeHighMemory
      expr: |
        (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.instance }} high memory usage"
        description: "Node {{ $labels.instance }} memory usage is above 85% (current: {{ $value | printf \"%.1f\" }}%)."

    - alert: NodeDiskSpaceLow
      expr: |
        (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) * 100 < 15
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.instance }} low disk space"
        description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} has less than 15% free (current: {{ $value | printf \"%.1f\" }}%)."

    - alert: PVCUsageHigh
      expr: |
        kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "PVC {{ $labels.persistentvolumeclaim }} usage high"
        description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is {{ $value | printf \"%.1f\" }}% full."
