grafana:
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    storageClassName: gp3-encrypted
    size: 5Gi
  # Loki 데이터소스 사전 설정 (Phase 3 이후 로그 조회 가능)
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.logging.svc.cluster.local:3100
      access: proxy
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/"
    security:
      allow_embedding: false
  # dashboards/ 하위 ConfigMap 자동 임포트
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: monitoring
      label: grafana_dashboard
      labelValue: "1"
      folder: /var/lib/grafana/dashboards/custom
      provider:
        foldersFromFilesStructure: false

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3-encrypted
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    # trip-service-prod 및 모니터링 네임스페이스 PrometheusRule 수집
    ruleNamespaceSelector: {}
    ruleSelector: {}
    podMonitorNamespaceSelector: {}
    podMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    # prometheus.io/scrape 어노테이션 기반 자동 수집
    additionalScrapeConfigs:
      - job_name: trip-service-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - trip-service-prod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3-encrypted
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    # ESO로 생성된 Slack webhook Secret 마운트
    secrets:
      - alertmanager-slack-webhook
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "slack-warning"
      routes:
        - matchers:
            - severity = critical
          receiver: "slack-critical"
          continue: false
        - matchers:
            - severity = warning
          receiver: "slack-warning"
          continue: false
    receivers:
      - name: "slack-critical"
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/slack-webhook-url
            channel: "#alerts-critical"
            send_resolved: true
            title: |-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
            text: |-
              {{ range .Alerts }}
              *Severity:* {{ .Labels.severity | toUpper }}
              *Namespace:* {{ .Labels.namespace }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
            color: |-
              {{ if eq .Status "firing" }}danger{{ else }}good{{ end }}
      - name: "slack-warning"
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/slack-webhook-url
            channel: "#alerts-warning"
            send_resolved: true
            title: |-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
            text: |-
              {{ range .Alerts }}
              *Severity:* {{ .Labels.severity | toUpper }}
              *Namespace:* {{ .Labels.namespace }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
            color: |-
              {{ if eq .Status "firing" }}warning{{ else }}good{{ end }}
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ["alertname", "namespace"]

# metrics-server 대신 Prometheus Adapter로 HPA 메트릭 공급
prometheusAdapter:
  enabled: false  # 별도 설치 예정

# 노드 메트릭 수집
nodeExporter:
  enabled: true

# kube-state-metrics (Deployment/Pod 상태 메트릭)
kubeStateMetrics:
  enabled: true
