apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-service-stability
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  service-stability.json: |
    {
      "title": "Trip Service - Stability",
      "uid": "trip-stability",
      "tags": ["trip-service", "stability"],
      "timezone": "Asia/Seoul",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Pod Restart Rate (15m)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(kube_pod_container_status_restarts_total{namespace=\"trip-service-prod\"}[15m]) * 60",
              "legendFormat": "{{ pod }} / {{ container }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Pod Ready Status",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(kube_pod_status_ready{namespace=\"trip-service-prod\", condition=\"true\"})",
              "legendFormat": "Ready Pods"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "red", "value": null },
                { "color": "green", "value": 1 }
              ]}
            }
          }
        },
        {
          "id": 3,
          "title": "Deployment Available Replicas",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"trip-service-prod\"}",
              "legendFormat": "{{ deployment }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 4,
          "title": "HPA Current vs Max Replicas",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"trip-service-prod\"}",
              "legendFormat": "current / {{ horizontalpodautoscaler }}"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"trip-service-prod\"}",
              "legendFormat": "max / {{ horizontalpodautoscaler }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 5,
          "title": "Node CPU Usage %",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "100 - (avg by(node) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{ node }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 70 },
                { "color": "red", "value": 85 }
              ]}
            }
          }
        },
        {
          "id": 6,
          "title": "Node Memory Usage %",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100",
              "legendFormat": "{{ instance }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 70 },
                { "color": "red", "value": 85 }
              ]}
            }
          }
        },
        {
          "id": 7,
          "title": "Container CPU Usage",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by(pod) (rate(container_cpu_usage_seconds_total{namespace=\"trip-service-prod\", container!=\"\"}[5m]))",
              "legendFormat": "{{ pod }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "cores" } }
        },
        {
          "id": 8,
          "title": "Container Memory Usage",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 24, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by(pod) (container_memory_working_set_bytes{namespace=\"trip-service-prod\", container!=\"\"})",
              "legendFormat": "{{ pod }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        }
      ]
    }
