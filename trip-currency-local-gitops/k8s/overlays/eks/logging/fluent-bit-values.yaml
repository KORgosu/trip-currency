kind: DaemonSet

# 시스템 로그 수집을 위한 권한
serviceAccount:
  create: true
  name: fluent-bit

rbac:
  create: true

# 모든 노드에서 실행
tolerations:
  - operator: Exists

config:
  service: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

  inputs: |
    # 컨테이너 stdout/stderr 로그
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        Exclude_Path      /var/log/containers/fluent-bit*,/var/log/containers/aws-node*,/var/log/containers/kube-proxy*

    # 호스트 시스템 로그 (노드 레벨)
    [INPUT]
        Name          systemd
        Tag           host.*
        Systemd_Filter  _SYSTEMD_UNIT=kubelet.service
        Read_From_Tail On

  filters: |
    # Kubernetes 메타데이터 보강 (네임스페이스, Pod명, 컨테이너명)
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    # 네임스페이스별 로그 레벨 태그 추가
    [FILTER]
        Name    modify
        Match   kube.*
        Add     cluster trip-service-cluster
        Add     region  ap-northeast-2

  outputs: |
    # trip-service-prod 로그 → 전용 로그 그룹
    [OUTPUT]
        Name                cloudwatch_logs
        Match               kube.*trip-service-prod*
        region              ap-northeast-2
        log_group_name      /eks/trip-service-cluster/applications
        log_stream_prefix   ${HOSTNAME}-
        auto_create_group   On
        log_retention_days  30

    # monitoring/logging 네임스페이스 로그 → 인프라 로그 그룹
    [OUTPUT]
        Name                cloudwatch_logs
        Match               kube.*monitoring*
        region              ap-northeast-2
        log_group_name      /eks/trip-service-cluster/infra
        log_stream_prefix   ${HOSTNAME}-
        auto_create_group   On
        log_retention_days  14

    # 호스트(kubelet) 로그
    [OUTPUT]
        Name                cloudwatch_logs
        Match               host.*
        region              ap-northeast-2
        log_group_name      /eks/trip-service-cluster/host
        log_stream_prefix   ${HOSTNAME}-
        auto_create_group   On
        log_retention_days  14

# 호스트 로그 볼륨 마운트
volumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: etcmachineid
    mountPath: /etc/machine-id
    readOnly: true

volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: etcmachineid
    hostPath:
      path: /etc/machine-id
      type: File

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
