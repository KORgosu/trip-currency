# EKS overlay: 이미지 레지스트리의 ${AWS_ACCOUNT_ID}는 Git에 실계정을 두지 않기 위한 플레이스홀더입니다.
# 적용·렌더 전에 envsubst(또는 CI)로 실제 12자리 계정 ID로 치환하거나, Argo CD에서 이미지 경로를 별도로 보강하세요.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trip-service-prod

resources:
- ../../base
- namespace.yaml
- ingress.yaml
- storageclass.yaml
- external-secrets/
- network-policies/

patches:
- target:
    kind: Deployment
    name: service-frontend
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-northeast-2.amazonaws.com/service-frontend:EKS-9
    - op: replace
      path: /spec/template/spec/containers/0/imagePullPolicy
      value: Always

- target:
    kind: Deployment
    name: service-currency
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-northeast-2.amazonaws.com/service-currency:EKS-9
    - op: replace
      path: /spec/template/spec/containers/0/imagePullPolicy
      value: Always

- target:
    kind: Deployment
    name: service-history
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-northeast-2.amazonaws.com/service-history:EKS-9
    - op: replace
      path: /spec/template/spec/containers/0/imagePullPolicy
      value: Always

- target:
    kind: Deployment
    name: service-ranking
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-northeast-2.amazonaws.com/service-ranking:EKS-9
    - op: replace
      path: /spec/template/spec/containers/0/imagePullPolicy
      value: Always

- target:
    kind: CronJob
    name: service-dataingestor-cronjob
  patch: |-
    - op: replace
      path: /spec/jobTemplate/spec/template/spec/containers/0/image
      value: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-northeast-2.amazonaws.com/service-dataingestor:EKS-9
    - op: replace
      path: /spec/jobTemplate/spec/template/spec/containers/0/imagePullPolicy
      value: Always

- target:
    kind: ConfigMap
    name: trip-service-config
  patch: |-
    - op: replace
      path: /data/MYSQL_USER
      value: "trip_admin"
    - op: replace
      path: /data/MONGODB_USER
      value: "trip_admin"
    - op: add
      path: /data/ENVIRONMENT
      value: "prod"
    - op: add
      path: /data/CLOUD_PROVIDER
      value: "aws"
    - op: add
      path: /data/REGION
      value: "ap-northeast-2"

- target:
    kind: Deployment
    name: service-frontend
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          memory: "32Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"
          cpu: "200m"